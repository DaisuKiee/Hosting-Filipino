version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: bot-panel-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: discord-bot-panel

  panel:
    build: .
    container_name: bot-panel
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./bot-data:/app/bot-data
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/discord-bot-panel
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=production
      - CLIENT_URL=http://localhost:5000
    depends_on:
      - mongodb

volumes:
  mongodb_data:
